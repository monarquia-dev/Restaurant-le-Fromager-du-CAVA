<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Commandes | Le Fromager de La CAVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f2eb;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #009245;
            margin-bottom: 0.5rem;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .btn-back {
            background: #f77f00;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
        }
        .orders-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .order-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.5rem;
            border-left: 6px solid #f77f00;
        }
        .order-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }
        .order-id { font-weight: 800; color: #2c3e50; }
        .order-date { color: #7f8c8d; font-size: 0.85rem; }
        .order-status {
            background: #ffedd5;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .client-info {
            background: #fef9ef;
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        .items-table th, .items-table td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #f0e4d4;
        }
        .total-order {
            font-weight: 800;
            font-size: 1.2rem;
            text-align: right;
            margin-top: 0.5rem;
        }
        .btn-delete {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .empty {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 32px;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            color: #7f8c8d;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-bar">
        <div>
            <h1><i class="fas fa-clipboard-list"></i> Commandes clients</h1>
            <p>Paiement à la livraison · Gestion des commandes</p>
        </div>
        <a href="Le Fromager du  Cava.html" class="btn-back"><i class="fas fa-arrow-left"></i> Retour à la boutique</a>
    </div>
    <div id="ordersList" class="orders-grid"></div>
</div>
<footer>
    <p>🔐 Accès administrateur – Les commandes sont stockées localement dans votre navigateur.</p>
</footer>

<script>
    function renderOrders() {
        const container = document.getElementById("ordersList");
        const orders = JSON.parse(localStorage.getItem("resto_orders") || "[]");
        if (orders.length === 0) {
            container.innerHTML = `<div class="empty"><i class="fas fa-shopping-cart" style="font-size:2rem;"></i><p>Aucune commande pour le moment.</p></div>`;
            return;
        }
        let html = "";
        orders.reverse().forEach(order => {
            html += `
                <div class="order-card" data-id="${order.id}">
                    <div class="order-header">
                        <div><span class="order-id">#${order.id}</span> · <span class="order-date">${order.date}</span></div>
                        <span class="order-status">${order.status}</span>
                    </div>
                    <div class="client-info">
                        <p><strong><i class="fas fa-user"></i> ${escapeHtml(order.client.name)}</strong> | 📞 ${escapeHtml(order.client.phone)}</p>
                        <p><i class="fas fa-location-dot"></i> ${escapeHtml(order.client.address)}</p>
                        ${order.client.note ? `<p><i class="fas fa-pen"></i> Note : ${escapeHtml(order.client.note)}</p>` : ''}
                        <p><i class="fas fa-money-bill-wave"></i> ${order.payment}</p>
                    </div>
                    <table class="items-table">
                        <thead><tr><th>Plat</th><th>Qté</th><th>Prix unit.</th><th>Total</th></tr></thead>
                        <tbody>
                            ${order.items.map(item => `
                                <tr>
                                    <td>${escapeHtml(item.name)}</td>
                                    <td>${item.quantity}</td>
                                    <td>${item.price} FCFA</td>
                                    <td>${item.price * item.quantity} FCFA</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="total-order">Montant total : <strong>${order.total} FCFA</strong> (à encaisser)</div>
                    <button class="btn-delete" onclick="deleteOrder(${order.id})"><i class="fas fa-trash"></i> Supprimer la commande</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function deleteOrder(orderId) {
        if (confirm("Supprimer définitivement cette commande ?")) {
            let orders = JSON.parse(localStorage.getItem("resto_orders") || "[]");
            orders = orders.filter(o => o.id !== orderId);
            localStorage.setItem("resto_orders", JSON.stringify(orders));
            renderOrders();
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    renderOrders();
</script>
</body>
</html>
